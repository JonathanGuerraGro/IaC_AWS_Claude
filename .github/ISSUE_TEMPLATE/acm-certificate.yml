name: "Solicitar Certificado ACM"
description: "Solicita un certificado SSL/TLS en AWS Certificate Manager"
title: "[ACM] "
labels: ["iac", "acm", "pending"]
body:
  - type: input
    id: domain_name
    attributes:
      label: "Dominio principal"
      placeholder: "app.miempresa.com"
    validations:
      required: true

  - type: input
    id: san_domains
    attributes:
      label: "SANs adicionales (opcional)"
      description: "Dominios adicionales separados por coma"
      placeholder: "www.app.miempresa.com, api.miempresa.com"
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: "Entorno"
      options:
        - dev
        - staging
        - prod
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: "Region AWS"
      description: "CloudFront requiere us-east-1"
      options:
        - us-east-1
        - us-west-2
        - eu-west-1
        - eu-central-1
        - ap-southeast-1
    validations:
      required: true

  - type: dropdown
    id: validation_method
    attributes:
      label: "Metodo de validacion"
      options:
        - DNS
        - EMAIL
    validations:
      required: true

  - type: input
    id: owner_team
    attributes:
      label: "Equipo propietario"
      placeholder: "platform-team"
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: "Justificacion"
      placeholder: "Certificado para el nuevo microservicio de pagos"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Tags obligatorios"

  - type: input
    id: tag_ceco
    attributes:
      label: "CECO (Centro de Costos)"
      description: "Codigo del centro de costos para facturacion"
      placeholder: "CC-1234"
    validations:
      required: true

  - type: input
    id: tag_business_unit
    attributes:
      label: "Business Unit"
      description: "Unidad de negocio responsable del recurso"
      placeholder: "payments"
    validations:
      required: true

  - type: input
    id: tag_project_id
    attributes:
      label: "Project ID"
      description: "Identificador del proyecto en tu sistema de gestion"
      placeholder: "PROJ-5678"
    validations:
      required: true
