name: "Solicitar S3 Bucket"
description: "Crea un nuevo bucket S3 en AWS"
title: "[S3] "
labels: ["iac", "s3", "pending"]
body:
  - type: input
    id: bucket_name
    attributes:
      label: "Nombre del bucket"
      description: "Debe ser unico globalmente. Usa guiones, no underscores."
      placeholder: "mi-proyecto-assets-prod"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: "Entorno"
      options:
        - dev
        - staging
        - prod
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: "Region AWS"
      options:
        - us-east-1
        - us-west-2
        - eu-west-1
        - eu-central-1
        - ap-southeast-1
    validations:
      required: true

  - type: dropdown
    id: versioning
    attributes:
      label: "Habilitar versionado?"
      options:
        - "true"
        - "false"
    validations:
      required: true

  - type: dropdown
    id: public_access
    attributes:
      label: "Bloquear acceso publico?"
      description: "Recomendado: true para la mayoria de casos"
      options:
        - "true"
        - "false"
    validations:
      required: true

  - type: input
    id: owner_team
    attributes:
      label: "Equipo propietario"
      placeholder: "backend-team"
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: "Justificacion"
      description: "Para que se usara este bucket?"
      placeholder: "Almacenamiento de assets estaticos para la app X"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Tags obligatorios"

  - type: input
    id: tag_ceco
    attributes:
      label: "CECO (Centro de Costos)"
      description: "Codigo del centro de costos para facturacion"
      placeholder: "CC-1234"
    validations:
      required: true

  - type: input
    id: tag_business_unit
    attributes:
      label: "Business Unit"
      description: "Unidad de negocio responsable del recurso"
      placeholder: "payments"
    validations:
      required: true

  - type: input
    id: tag_project_id
    attributes:
      label: "Project ID"
      description: "Identificador del proyecto en tu sistema de gestion"
      placeholder: "PROJ-5678"
    validations:
      required: true
